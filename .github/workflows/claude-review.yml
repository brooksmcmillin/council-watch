name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  code-review:
    name: Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this PR for code quality, correctness, and maintainability.
            Focus on:
            - Logic errors or bugs
            - Missing error handling
            - SQLAlchemy session management issues
            - FastAPI best practices
            - Python type hint correctness
            - Security concerns (SQL injection, XSS in templates, credential handling)

            Format your review as a structured comment with sections for issues found.
            If no issues, say so briefly.
          timeout_minutes: 10

  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this PR with a security focus. Check for:
            - Injection vulnerabilities (SQL, command, template)
            - Credential or secret exposure
            - Unsafe HTTP client usage (SSRF, missing TLS verification)
            - Authentication/authorization gaps
            - Insecure deserialization
            - Path traversal in file operations
            - Hardcoded secrets or tokens

            Format your review as a structured comment. If no issues, say so briefly.
          timeout_minutes: 10

  review-gate:
    name: Review Gate
    runs-on: ubuntu-latest
    needs: [code-review, security-review]
    steps:
      - run: echo "All reviews passed"
