name: Claude Reviews

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  combined-review:
    name: Combined Review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    env:
      REVIEW_FILE: ${{ github.workspace }}/claude-review-output.md

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Minimize previous review comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          MARKER="<!-- claude-combined-review -->"

          COMMENT_NODE_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq "[.[] | select(.body | contains(\"${MARKER}\"))] | last | .node_id // empty" 2>/dev/null)

          if [ -n "$COMMENT_NODE_ID" ]; then
            echo "Minimizing previous review comment: $COMMENT_NODE_ID"
            gh api graphql -f query='
              mutation {
                minimizeComment(input: {subjectId: "'"$COMMENT_NODE_ID"'", classifier: OUTDATED}) {
                  minimizedComment { isMinimized }
                }
              }' 2>/dev/null || echo "Warning: failed to minimize comment"
          else
            echo "No previous review comment found"
          fi

      - name: Run Claude Combined Review
        id: claude-review
        timeout-minutes: 15
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "dependabot[bot]"
          prompt: |
            You are a code and security reviewer. Review this pull request for code quality,
            correctness, maintainability, AND security vulnerabilities.

            Use the repository's CLAUDE.md for guidance on style, conventions, and codebase architecture.

            ## Required Output — Read First

            You MUST write your complete review to the file `${{ env.REVIEW_FILE }}` using the
            `Write` tool before this turn ends. Do NOT post a PR comment yourself — a later
            deterministic CI step reads this file, posts it as the review comment, and gates the
            merge on its verdict. Writing the file is the only action that completes the review.

            This applies even when:
            - The PR has not changed since your previous review
            - Every previously flagged issue is now fixed
            - You find nothing at all to flag

            In any of those cases, still write a short "All clear" review to the file — first line
            is the marker, last line is the verdict (see below). A missing or empty file is treated
            as an infrastructure error and blocks merge, so always write it.

            Write the file exactly once, with the full, final review content. Never write a
            placeholder, partial, or "will update later" file.

            ## File Format

            The first line of the file MUST be exactly this HTML comment marker on its own line:
            `<!-- claude-combined-review -->`

            The last line of the file MUST be a machine-readable verdict (see "Verdict" below).

            ## Reading Previous Feedback

            Before writing your review, read the most recent review comment on this PR to understand
            what was previously flagged, so you can track fixed vs. still-open items. New comments
            reiterate any still-open issues, so only the latest is needed:

            ```
            gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              --paginate --jq '[.[] | select(.body | contains("<!-- claude-combined-review -->"))] | last | .body // empty'
            ```

            ## Formatting Rules

            Compare the current code against previously flagged issues and categorize:

            - **Previously flagged + now fixed** → show with ~~strikethrough~~ and a "Fixed" note
            - **Previously flagged + still present** → reference briefly without re-explaining
            - **New issues** → standard formatting with full explanation

            Structure your review using these sections (omit any section that has no items):

            ### Resolved
            Items previously flagged that are now fixed, shown with ~~strikethrough~~. Example:
            - ~~Missing error handling in `parse_config()`~~ — Fixed

            ### Still Open
            Previously flagged items **within the PR's changed code** that remain unaddressed.
            Do NOT include pre-existing issues outside the PR's scope here.

            ### New Issues
            Newly discovered problems **that must be fixed before merge**. Full explanation required.

            ### Security
            Security-specific findings: injection vulnerabilities (SQL, command, XSS, template injection),
            authentication/authorization issues, data exposure (secrets, PII in logs, information leakage),
            input validation at system boundaries, SSRF, path traversal, and other OWASP Top 10 issues.
            If no security issues found, note "No security issues identified."

            ### Suggestions
            Non-blocking observations: minor improvements, follow-up items, style preferences,
            or pre-existing issues noticed outside the PR scope. These do not block merge.

            If everything is clean and there are no issues in any category, still write the file — a
            short "All clear" review with the marker on the first line and `<!-- verdict: pass -->` on
            the last. See "Required Output" above; not writing the file is never an option.

            ## Verdict

            The final line of the file MUST be a machine-readable verdict as an HTML comment:
            - `<!-- verdict: pass -->` if there are NO blocking issues (i.e., no New Issues, Still Open, or Security items that must be fixed before merge)
            - `<!-- verdict: fail -->` if there ARE blocking issues that must be fixed before merge

            A `fail` verdict requires at least one item that would cause a runtime error, data loss,
            security vulnerability, or incorrect behavior in production. Style preferences, type
            annotation choices, test methodology opinions, and minor improvements belong in Suggestions
            and do NOT warrant a fail verdict.

            If you flagged an item as non-blocking or low-severity in a previous review, do not
            escalate it to blocking in subsequent reviews unless new information changes the severity.

            ## Review Focus Areas

            **Code Quality:**
            - Correctness: logic errors, edge cases, error handling
            - Maintainability: readability, structure, naming
            - Style: consistency with project patterns
            - SQLAlchemy session management (session lifecycle, DetachedInstanceError, savepoints)
            - FastAPI best practices
            - Python type hint correctness (built-in generics, PEP 604 unions)

            **Security:**
            - Injection vulnerabilities (SQL, command, XSS, Jinja2 template injection)
            - Authentication and authorization issues
            - Data exposure (secrets, PII in logs, information leakage)
            - Input validation at system boundaries
            - Unsafe HTTP client usage (SSRF, missing TLS verification)
            - Path traversal in file operations
            - SSRF, path traversal, and other OWASP Top 10 issues

            ## Tool Usage
            Use Read, Grep, Glob, and the read-only gh commands (gh pr diff, gh pr view, gh api) to
            review the code. Do NOT attempt to run security scanners (trivy, bandit, semgrep, npm
            audit, pip-audit, etc.) — dependency scanning is handled by a separate CI workflow. Focus
            on manual code review of the diff.

            Use the `Write` tool to save your full review to `${{ env.REVIEW_FILE }}`. Per "Required
            Output" above, writing this file is mandatory on every run; do not post a comment yourself.

          claude_args: '--allowed-tools "Write,Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*),Bash(gh api:*)"'

      - name: Post review comment and gate
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER=${{ github.event.pull_request.number }}

          # Derive the verdict from THIS run's output file, not from scraping prior
          # comments — that is what previously let a stale comment poison the gate.
          if [ -s "$REVIEW_FILE" ] && grep -q '<!-- verdict:' "$REVIEW_FILE"; then
            VERDICT=$(grep -oP '<!-- verdict: \K(pass|fail|error)' "$REVIEW_FILE" | tail -1)
            echo "Posting review from $REVIEW_FILE (verdict: ${VERDICT:-unknown})"
            gh pr comment "$PR_NUMBER" --body-file "$REVIEW_FILE"
          else
            VERDICT=""
          fi

          if [ -z "${VERDICT:-}" ]; then
            VERDICT=error
            echo "::warning::Review file missing, empty, or has no verdict. Posting fallback."
            gh pr comment "$PR_NUMBER" --body "$(printf '%s\n' \
              '<!-- claude-combined-review -->' \
              '' \
              '**Review did not complete successfully.** The AI reviewer did not produce a review file' \
              '(likely a tool error or timeout). Re-run the '\''Claude Reviews'\'' workflow or review manually.' \
              '' \
              '<!-- verdict: error -->')"
          fi

          echo "=== Review gate ==="
          case "$VERDICT" in
            pass)
              echo "Review Gate passed."
              ;;
            fail)
              echo "::error::Review verdict: fail — see the review comment for issues to fix."
              exit 1
              ;;
            *)
              echo "::error::Review infrastructure error — the AI reviewer failed to produce a verdict. Re-run the 'Claude Reviews' workflow or review manually. This is NOT a code issue."
              exit 1
              ;;
          esac
