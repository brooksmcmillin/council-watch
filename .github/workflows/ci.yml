name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check --output-format=github src/
      - run: uv run ruff format --check src/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --all-groups
      - run: uv run pyright src/

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --all-groups
      # GHSA-537c-gmf6-5ccf (cryptography <48.0.1) is unfixable here: atproto pins
      # cryptography<47, so 48.0.1 is unreachable until atproto relaxes that bound.
      - run: uvx pip-audit --require-hashes --no-deps --ignore-vuln GHSA-537c-gmf6-5ccf -r <(uv export --no-header --no-dev --no-emit-project)
