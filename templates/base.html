<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ city.name }} Council Meetings{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">{{ city.name }} Council Meetings</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/subscribe">Subscribe</a>
                <a href="/about">About</a>
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>Data sourced from <a href="{{ city.agenda_center_url }}">the {{ city.name }} Agenda Center</a>. Not affiliated with the City of {{ city.name }}.</p>
    </footer>
</body>
</html>
